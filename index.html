<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Premium Tic-Tac-Toe Instance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-blur-circle circle-1"></div>
    <div class="bg-blur-circle circle-2"></div>

    <div class="app-container">
        <header class="game-config glass-panel">
            <h1 class="title-gradient">TIC-TAC-TOE</h1>
            
            <div class="control-row">
                <div class="input-group">
                    <label for="gameMode">Game Mode</label>
                    <select id="gameMode">
                        <option value="pvp">Human vs Human</option>
                        <option value="pvc">Human vs Computer</option>
                    </select>
                </div>
            </div>

            <div class="players-setup">
                <div class="player-input" id="p1-panel">
                    <label>Player 1 (X)</label>
                    <div class="custom-fields">
                        <input type="text" id="p1Name" value="Player 1" maxlength="12">
                        <select id="p1Emoji">
                            <option value="❌">❌ X</option>
                            <option value="🔥">🔥 Fire</option>
                            <option value="⚡">⚡ Lightning</option>
                            <option value="👑">👑 Crown</option>
                        </select>
                    </div>
                </div>

                <div class="player-input" id="p2-panel">
                    <label id="p2Label">Player 2 (O)</label>
                    <div class="custom-fields">
                        <input type="text" id="p2Name" value="Player 2" maxlength="12">
                        <select id="p2Emoji">
                            <option value="⭕" selected>⭕ O</option>
                            <option value="❄️">❄️ Ice</option>
                            <option value="💥">💥 Blast</option>
                            <option value="💎">💎 Gem</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <button id="applyConfigBtn" class="btn btn-primary">Start / Reset Game</button>
        </header>

        <div class="scoreboard glass-panel">
            <div class="score-card id-p1 active-turn" id="card-p1">
                <div class="score-meta">
                    <span class="display-emoji" id="scoreEmoji1">❌</span>
                    <span class="display-name" id="scoreName1">Player 1</span>
                </div>
                <div class="score-digits" id="scoreVal1">0</div>
            </div>
            <div class="score-card id-p2" id="card-p2">
                <div class="score-meta">
                    <span class="display-emoji" id="scoreEmoji2">⭕</span>
                    <span class="display-name" id="scoreName2">Player 2</span>
                </div>
                <div class="score-digits" id="scoreVal2">0</div>
            </div>
        </div>

        <div class="status-ribbon" id="statusBox">Player 1's Turn</div>

        <main class="game-board glass-panel">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
